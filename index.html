<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sleek Stopwatch</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="stopwatch-card">
        <header class="header">
            <h1>Stopwatch</h1>
        </header>

        <div class="display-box">
            <div class="time">
                <span id="minutes">00</span>
                <span class="colon">:</span>
                <span id="seconds">00</span>
                <span id="millisec">00</span>
            </div>
        </div>

        <div class="button-group">
            <button id="start" class="btn-start">START</button>
            <button id="stop" class="btn-stop">STOP</button>
            <button id="lap" class="btn-lap">LAP</button>
            <button id="reset" class="btn-reset">RESET</button>
        </div>

        <div class="laps-container">
            <div id="laps-list" class="laps-list">
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
